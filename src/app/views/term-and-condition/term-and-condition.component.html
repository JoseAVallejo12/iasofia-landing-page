<section class="tc-container" aria-labelledby="titulo-terminos">
  <header>
    <h1 id="titulo-terminos" class="text-3xl font-bold text-gray-900 mb-2">Términos y Condiciones IA Sofía</h1>
    <p class="text-gray-600 text-sm">Última actualización: 2025-08-15</p>
    <div class="text-gray-600 text-sm mt-1">
      Proveedor: IA Sofía · 
      <a href="mailto:jose.vallejo@iasofia.io" class="text-blue-600 hover:underline">{{emailSoporte}}</a>
    </div>
  </header>

  <div class="border-t border-gray-200 my-6"></div>

  <div class="terms-accordion space-y-3">
    <div *ngFor="let section of sections" class="border border-gray-200 rounded-lg overflow-hidden">
      <button 
        (click)="toggleSection(section)" 
        class="w-full px-5 py-4 text-left flex justify-between items-center bg-white hover:bg-gray-50 transition-colors duration-200"
        [attr.aria-expanded]="section.isExpanded"
        [attr.aria-controls]="section.id"
      >
        <span class="font-medium text-gray-900">{{ section.title }}</span>
        <svg 
          class="w-5 h-5 text-gray-500 transform transition-transform duration-200" 
          [class.rotate-180]="section.isExpanded"
          fill="none" 
          viewBox="0 0 24 24" 
          stroke="currentColor"
        >
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
      <div 
        *ngIf="section.isExpanded"
        [id]="section.id"
        class="px-5 py-4 bg-gray-50 border-t border-gray-100 text-gray-700"
        [innerHTML]="section.content"
      ></div>
    </div>
  </div>

  <div class="sticky-accept bg-white border border-gray-200 rounded-lg p-5 mt-8 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm">
    <div class="flex items-center">
      <input 
        type="checkbox" 
        id="acepto" 
        [(ngModel)]="consent" 
        class="w-5 h-5 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
      >
      <label for="acepto" class="ml-2 block text-sm text-gray-700 cursor-pointer">
        He leído y acepto los Términos
      </label>
    </div>
    <button 
      (click)="emitirAceptacion()" 
      [disabled]="requireConsent && !consent"
      class="px-6 py-2 bg-blue-600 text-white font-medium rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed transition-colors"
    >
      Aceptar
    </button>
  </div>
  
  <p class="text-sm text-gray-500 mt-2 text-center">
    Si habilitas <em>requireConsent</em>, el botón se desactiva hasta marcar la casilla.
  </p>
</section>
